    }

    [data-theme="dark"] #cal-embed {
      background: var(--bg-page);
      color-scheme: dark;
    }

    [data-theme="dark"] #cal-embed * {
      color-scheme: dark;
    }

  <!-- Cal inline embed code begins -->
  <script type="text/javascript">
    const SEGMENT_CONFIG = {
      'just-getting-started': {
        segment: 'just-getting-started',
        segmentLabel: 'Just Getting Started',
        revenueRange: '$0-$250K in annual revenue',
        tier: 'lambda',
        calendarNumber: 2,
        calendarOwner: 'luke'
      },
      'lambda': {
        segment: 'lambda',
        segmentLabel: 'Lambda',
        revenueRange: '$250K-$750K in annual revenue',
        tier: 'lambda',
        calendarNumber: 2,
        calendarOwner: 'luke'
      },
      'alpha': {
        segment: 'alpha',
        segmentLabel: 'Alpha',
        revenueRange: '$750K-$1.5M in annual revenue',
        tier: 'alpha',
        calendarNumber: 1,
        calendarOwner: 'joncameron'
      },
      'sigma': {
        segment: 'sigma',
        segmentLabel: 'Sigma',
        revenueRange: '$1.5M-$3.6M in annual revenue',
        tier: 'sigma',
        calendarNumber: 1,
        calendarOwner: 'joncameron'
      },
      'omega': {
        segment: 'omega',
        segmentLabel: 'Omega',
        revenueRange: '$3.6M+ in annual revenue or multi-location',
        tier: 'enterprise',
        calendarNumber: 1,
        calendarOwner: 'joncameron'
      }
    };

    const CALENDAR_LINKS = {
      1: 'joncameron/olympus-demo',
      2: 'luke/olympus-demo'
    };

    const params = new URLSearchParams(window.location.search);
    const requestedSegment = params.get('segment') || sessionStorage.getItem('routing_segment') || 'lambda';
    const defaultSelection = SEGMENT_CONFIG[requestedSegment] || SEGMENT_CONFIG.lambda;

    const calendarParam = Number(params.get('calendar'));
    const resolvedCalendarNumber = calendarParam === 1 || calendarParam === 2
      ? calendarParam
      : defaultSelection.calendarNumber;

    const routingSelection = {
      ...defaultSelection,
      calendarNumber: resolvedCalendarNumber,
      calendarOwner: resolvedCalendarNumber === 1 ? 'joncameron' : 'luke'
    };
    const calLink = CALENDAR_LINKS[resolvedCalendarNumber] || CALENDAR_LINKS[1];


    sessionStorage.setItem('routing_segment', routingSelection.segment);
    sessionStorage.setItem('routing_segment_label', routingSelection.segmentLabel);
    sessionStorage.setItem('routing_revenue_range', routingSelection.revenueRange);
    sessionStorage.setItem('routing_tier', routingSelection.tier);
    sessionStorage.setItem('routing_calendar_owner', routingSelection.calendarOwner);
    sessionStorage.setItem('routing_calendar_number', String(routingSelection.calendarNumber));

    const leadName = sessionStorage.getItem('lead_name') || '';
    const leadEmail = sessionStorage.getItem('lead_email') || '';
    const leadPhone = sessionStorage.getItem('lead_phone') || '';

    const attribution = {
      utm_source: params.get('utm_source') || '',
      utm_medium: params.get('utm_medium') || '',
      utm_campaign: params.get('utm_campaign') || '',
      utm_term: params.get('utm_term') || '',
      utm_content: params.get('utm_content') || '',
      gclid: params.get('gclid') || '',
      fbclid: params.get('fbclid') || ''
    };

    (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
    Cal("init", "olympus-demo", {origin:"https://app.cal.com"});

    const calConfig = {
      layout: "month_view",
      successRedirectUrl: "https://olympus.etho.net/confirmation.html",
      metadata: {
        segment: routingSelection.segment,
        segmentLabel: routingSelection.segmentLabel,
        revenueRange: routingSelection.revenueRange,
        tier: routingSelection.tier,
        calendarNumber: routingSelection.calendarNumber,
        calendarOwner: routingSelection.calendarOwner,
        practiceDescription: sessionStorage.getItem('quiz_practice_description') || '',
        website: sessionStorage.getItem('quiz_website') || '',
        goals: sessionStorage.getItem('quiz_goals') || '',
        budget: sessionStorage.getItem('quiz_budget') || '',
        challenges: sessionStorage.getItem('quiz_challenges') || '',
        ...attribution
      }
    };

    if (leadName) calConfig.name = leadName;
    if (leadEmail) calConfig.email = leadEmail;
    if (leadPhone) calConfig.phone = leadPhone;

    Cal.ns["olympus-demo"]("inline", {
      elementOrSelector:"#cal-embed",
      config: calConfig,
      calLink: calLink
    });

    Cal.ns["olympus-demo"]("ui", {"cssVarsPerTheme":{"light":{"cal-brand":"#000000"},"dark":{"cal-brand":"#ffffff","cal-bg":"#0a0a0a"}},"hideEventTypeDetails":false,"layout":"month_view"});

    // Update Cal.com theme when it's ready
    Cal("on", {
      action: "ready",
      callback: function() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        Cal.ns["olympus-demo"]("ui", {
          "cssVarsPerTheme": {
            "light": {"cal-brand": "#000000"},
            "dark": {"cal-brand": "#ffffff", "cal-bg": "#0a0a0a"}
          }
        });
      }
    });

    // Listen for booking success
    Cal("on", {
      action: "bookingSuccessfulV2",
      callback: function(e) {
        console.log('BOOKING SUCCESS EVENT FIRED', e);
        const data = e.detail.data;

        sessionStorage.setItem('booking', JSON.stringify({
          uid: data.uid,
          title: data.title,
          startTime: data.startTime,
          endTime: data.endTime
        }));

        // Fire conversion events
        if (typeof fbq !== 'undefined') {
          fbq('track', 'Schedule', {
            content_name: data.title,
            booking_id: data.uid
          });
        }

        if (typeof gtag !== 'undefined') {
          gtag('event', 'conversion', {
            'send_to': 'AW-XXXXXXXXX/BOOKING_LABEL',
            'value': 1.0,
            'currency': 'USD'
          });
        }

        // Send notification to RO.AM
        fetch('/api/notify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'booking',
            data: {
              uid: data.uid,
              title: data.title,
              startTime: data.startTime,
              endTime: data.endTime,
              attendeeName: sessionStorage.getItem('lead_name') || 'Unknown',
              attendeeEmail: sessionStorage.getItem('lead_email') || 'Unknown',
              segment: sessionStorage.getItem('routing_segment') || routingSelection.segment,
              segmentLabel: sessionStorage.getItem('routing_segment_label') || routingSelection.segmentLabel,
              revenueRange: sessionStorage.getItem('routing_revenue_range') || routingSelection.revenueRange,
              tier: sessionStorage.getItem('routing_tier') || routingSelection.tier,
              calendarOwner: sessionStorage.getItem('routing_calendar_owner') || routingSelection.calendarOwner,
              calendarNumber: sessionStorage.getItem('routing_calendar_number') || String(routingSelection.calendarNumber)
            }
          })
        }).catch(function() {
          console.log('Booking notification queued for retry');
        });

        setTimeout(function() {
          window.location.href = '/confirmation.html';
        }, 1500);
      }
    });

    // Listen for booking errors
    Cal("on", {
      action: "bookingFailed",
      callback: function(e) {
        console.error('Cal.com booking failed:', e);
        alert('Booking could not be completed. Please try a different time slot or refresh the page.');
      }
    });

    // Debug: Log ALL Cal.com events
    Cal("on", {
      action: "*",
      callback: function(e) {
        console.log('CAL EVENT:', e.detail.action, e.detail);
      }
    });
  </script>

  <script>
    (function() {
      const ghostText = document.querySelector('.footer-olympus-ghost');
      if (!ghostText) return;

      ghostText.addEventListener('mousemove', function(e) {
        const rect = this.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        this.style.setProperty('--mouse-x', `${x}%`);
        this.style.setProperty('--mouse-y', `${y}%`);
      });

      ghostText.addEventListener('mouseleave', function() {
        this.style.removeProperty('--mouse-x');
        this.style.removeProperty('--mouse-y');
      });
    })();
  </script>

  <!-- Mobile Menu Toggle -->
  <script>
  (function() {
    var hamburger = document.querySelector('.hamburger');
    var mobileMenu = document.querySelector('.mobile-menu');
    var closeBtn = document.querySelector('.mobile-menu-close');

    if (!hamburger || !mobileMenu) return;

    function openMenu() {
      mobileMenu.classList.add('is-open');
      mobileMenu.setAttribute('aria-hidden', 'false');
      hamburger.setAttribute('aria-expanded', 'true');
      document.body.classList.add('menu-open');
    }

    function closeMenu() {
      mobileMenu.classList.remove('is-open');
      mobileMenu.setAttribute('aria-hidden', 'true');
      hamburger.setAttribute('aria-expanded', 'false');
      document.body.classList.remove('menu-open');
    }

    hamburger.addEventListener('click', openMenu);

    if (closeBtn) {
      closeBtn.addEventListener('click', closeMenu);
    }

    // Close menu when clicking a nav link
    var navLinks = mobileMenu.querySelectorAll('.mobile-menu-link');
    navLinks.forEach(function(link) {
      link.addEventListener('click', closeMenu);
    });

    // Close on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && mobileMenu.classList.contains('is-open')) {
        closeMenu();
      }
    });
  })();
  </script>
